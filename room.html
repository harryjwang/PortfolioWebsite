<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harry Wang — Room</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0c0b0a;color:#ede8dd;font-family:'Geist Mono',monospace;overflow:hidden;cursor:none;}
canvas{display:block;}
#canvas-container{position:fixed;inset:0;}

/* cursor */
#cur{position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
#cur-dot{width:8px;height:8px;background:#e8c97a;border-radius:50%;transition:transform .15s,background .2s;}
#cur-ring{position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);width:32px;height:32px;border:1px solid rgba(232,201,122,.4);border-radius:50%;transition:width .2s,height .2s,border-color .2s;}
body.hover #cur-dot{transform:translate(-50%,-50%) scale(3);background:#e8543a;}
body.hover #cur-ring{width:52px;height:52px;border-color:rgba(232,84,58,.5);}

/* HUD top */
#hud{position:fixed;top:0;left:0;right:0;padding:24px 36px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:100;}
#hud-name{font-family:'Instrument Serif',serif;font-size:1.15rem;letter-spacing:.01em;}
#hud-name i{font-style:italic;color:#e8c97a;}
#hud-sub{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(237,232,221,.3);margin-top:3px;}
#hud-hint{font-size:.58rem;letter-spacing:.12em;color:rgba(237,232,221,.28);text-align:right;line-height:2;}
#back-link{
  position:fixed;top:24px;right:36px;z-index:200;
  font-family:'Geist Mono',monospace;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;
  color:rgba(232,201,122,.6);text-decoration:none;
  border:1px solid rgba(232,201,122,.2);padding:7px 16px;
  transition:color .2s,border-color .2s,background .2s;
}
#back-link:hover{color:#e8c97a;border-color:rgba(232,201,122,.5);background:rgba(232,201,122,.06);}

/* Zone indicator bottom left */
#zone-display{position:fixed;bottom:36px;left:36px;pointer-events:none;z-index:100;}
#zone-tag{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:#e8c97a;margin-bottom:4px;opacity:0;transition:opacity .5s;}
#zone-name{font-family:'Instrument Serif',serif;font-size:2.8rem;line-height:1;letter-spacing:-.01em;opacity:0;transition:opacity .5s;}
#zone-desc{font-size:.65rem;line-height:1.7;color:rgba(237,232,221,.5);max-width:320px;margin-top:8px;opacity:0;transition:opacity .5s;}

/* Nav dots bottom right */
#nav{position:fixed;bottom:36px;right:36px;z-index:100;display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
.nd{display:flex;align-items:center;gap:10px;cursor:pointer;opacity:.3;transition:opacity .3s;}
.nd:hover,.nd.active{opacity:1;}
.nd-label{font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;}
.nd-pip{width:5px;height:5px;border-radius:50%;background:#ede8dd;transition:background .3s,transform .3s;}
.nd.active .nd-pip{background:#e8c97a;transform:scale(1.6);}

/* Modal */
#modal{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s;}
#modal.open{opacity:1;pointer-events:all;}
#modal-bg{position:absolute;inset:0;background:rgba(12,11,10,.8);backdrop-filter:blur(16px);}
#modal-card{position:relative;z-index:1;background:#141210;border:1px solid rgba(232,201,122,.15);max-width:580px;width:90%;padding:52px 56px;transform:translateY(20px);transition:transform .4s;}
#modal.open #modal-card{transform:translateY(0);}
#modal-x{position:absolute;top:18px;right:22px;background:none;border:none;color:rgba(237,232,221,.4);font:400 1.5rem 'Geist Mono',monospace;cursor:pointer;transition:color .2s;}
#modal-x:hover{color:#e8c97a;}
#modal-eyebrow{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:#e8c97a;margin-bottom:10px;}
#modal-title{font-family:'Instrument Serif',serif;font-size:2rem;line-height:1.1;margin-bottom:18px;}
#modal-body{font-size:.76rem;line-height:1.9;color:rgba(237,232,221,.65);}
#modal-body strong{color:#ede8dd;font-weight:500;}
#modal-body a{color:#e8c97a;text-decoration:none;}
#modal-body a:hover{text-decoration:underline;}
#modal-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:20px;}
.chip{font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;border:1px solid rgba(232,201,122,.25);color:#e8c97a;padding:3px 10px;}

/* Intro */
#intro{position:fixed;inset:0;z-index:500;background:#0c0b0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .9s;}
#intro.gone{opacity:0;pointer-events:none;}
#intro h1{font-family:'Instrument Serif',serif;font-size:clamp(3rem,7vw,5.5rem);letter-spacing:-.02em;text-align:center;}
#intro h1 i{font-style:italic;color:#e8c97a;}
#intro p{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(237,232,221,.35);}
#intro-btn{margin-top:28px;background:none;border:1px solid rgba(232,201,122,.4);color:#e8c97a;font-family:'Geist Mono',monospace;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;padding:14px 40px;cursor:pointer;transition:background .2s,color .2s;}
#intro-btn:hover{background:#e8c97a;color:#0c0b0a;}

/* scroll bar */
#pbar{position:fixed;top:0;left:0;height:2px;background:#e8c97a;z-index:200;transition:width .5s ease;}
</style>
</head>

<div id="cur"><div id="cur-dot"></div></div>
<div id="cur-ring"></div>

<div id="intro">
  <h1>Harry <i>Wang</i></h1>
  <p>4A Computer Engineering · University of Waterloo</p>
  <button id="intro-btn">Enter the Room ↓</button>
</div>

<a href="/" id="back-link">← Portfolio</a>

<div id="hud">

<div id="zone-display">

<div id="nav"></div>

<div id="modal">

<script>

        body:`<strong>3A Computer Engineering</strong> at the University of Waterloo. I build at every layer of the stack — from ARM assembly and ASIC testbenches to Python data platforms and interactive web experiences.<br><br>Currently on the <strong>UW ASIC Design Team</strong> (control group lead) and <strong>UW Baja SAE</strong>. Doing co-op terms in software/data engineering. Always shipping something.<br><br>Based in <strong>Markham, ON</strong>. Volleyball, tennis, Japan enthusiast.<br><br><a href="https://github.com/harryjwang" target="_blank">↗ GitHub</a> &nbsp;&nbsp; <a href="https://www.linkedin.com/in/harry-j-wang/" target="_blank">↗ LinkedIn</a>`,

// ═══════════════════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════════════════
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c0b0a);
scene.fog = new THREE.FogExp2(0x0c0b0a,.045);

const camera = new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,80);
camera.position.set(0,4,11);

// ═══════════════════════════════════════════════════════
// LIGHTING
// ═══════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x1a1814,2.2));

// Main ceiling fill
const sun = new THREE.DirectionalLight(0xfff4e0,.7);
sun.position.set(2,10,4);
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=.5;
sun.shadow.camera.far=40;
sun.shadow.camera.left=-12;sun.shadow.camera.right=12;
sun.shadow.camera.top=12;sun.shadow.camera.bottom=-12;
scene.add(sun);

// Warm fill
const fill = new THREE.DirectionalLight(0xffa060,.18);
fill.position.set(-6,5,-4);
scene.add(fill);

// Zone accent lights (start dim, zone navigation lights them up)
const zoneLights = ZONES.map((z,i)=>{
  const l = new THREE.PointLight(z.color,.0,9,1.5);
  const p = [[-4,5,2],[4.5,5,2],[0,5,-3],[5.5,5,-3],[-5.5,5,-3]];
  l.position.set(...p[i]);
  scene.add(l);
  return l;
});

// Lamp warm glow (always on)
const lampLight = new THREE.PointLight(0xffb347,1.4,5,2);
lampLight.position.set(-7,3.8,-5.5);
scene.add(lampLight);

// Monitor glow
const monGlow = new THREE.PointLight(0x4a8eff,.6,2.5,2);
monGlow.position.set(-3.5,1.9,-6.5);
scene.add(monGlow);

// ═══════════════════════════════════════════════════════
// MATERIALS PALETTE
// ═══════════════════════════════════════════════════════
const M = {
  // Walls / room
  floorWood: new THREE.MeshLambertMaterial({color:0x1a130d}),
  wallPaint: new THREE.MeshLambertMaterial({color:0x111014}),
  wallAccent: new THREE.MeshLambertMaterial({color:0x0e0d12}),

  rug: new THREE.MeshLambertMaterial({color:0x1c1728}),

  baseboard: new THREE.MeshLambertMaterial({color:0x1e1c28}),

  // Furniture woods
  deskWood: new THREE.MeshLambertMaterial({color:0x2d1f0f}),

  // Metal
  metalDark: new THREE.MeshLambertMaterial({color:0x252535}),
  metalMid: new THREE.MeshLambertMaterial({color:0x33334a}),
  chrome: new THREE.MeshLambertMaterial({color:0x4a4a60}),

  // Chair / upholstery
  chairFabric: new THREE.MeshLambertMaterial({color:0x1a1528}),

  couchFabric: new THREE.MeshLambertMaterial({color:0x2e2040}),

  // Electronics

  potDark: new THREE.MeshLambertMaterial({color:0x3e2820}),

  books: [
    new THREE.MeshLambertMaterial({color:0xc0392b}),
    new THREE.MeshLambertMaterial({color:0x1a6b9a}),

    new THREE.MeshLambertMaterial({color:0xd35400}),

  racketFrame: new THREE.MeshLambertMaterial({color:0x2d7a1f}),
  racketHandle: new THREE.MeshLambertMaterial({color:0x4a2010}),

  sportsBag: new THREE.MeshLambertMaterial({color:0x1a237e}),
  corkboard: new THREE.MeshLambertMaterial({color:0x8b6340}),
  pin: new THREE.MeshLambertMaterial({color:0xe8543a}),

// ═══════════════════════════════════════════════════════
// GEOMETRY HELPERS
// ═══════════════════════════════════════════════════════
function add(mesh){scene.add(mesh);return mesh;}
function box(w,h,d,mat,x,y,z,ry=0,rx=0){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z);m.rotation.set(rx,ry,0);
  m.castShadow=true;m.receiveShadow=true;
  return add(m);
}
function cyl(rt,rb,h,mat,x,y,z,ry=0){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,24),mat);
  m.position.set(x,y,z);m.rotation.y=ry;
  m.castShadow=true;m.receiveShadow=true;
  return add(m);
}
function sph(r,mat,x,y,z){
  const m=new THREE.Mesh(new THREE.SphereGeometry(r,24,24),mat);
  m.position.set(x,y,z);m.castShadow=true;
  return add(m);
}
function torus(r,tube,mat,x,y,z,rx=0,ry=0){
  const m=new THREE.Mesh(new THREE.TorusGeometry(r,tube,12,32),mat);
  m.position.set(x,y,z);m.rotation.set(rx,ry,0);
  m.castShadow=true;return add(m);
}
function plane(w,d,mat,x,y,z,rx=0,ry=0){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),mat);
  m.position.set(x,y,z);m.rotation.set(rx,ry,0);
  m.receiveShadow=true;return add(m);
}

plane(22,16,M.floorWood,0,0,0,-Math.PI/2);

plane(22,9,M.wallPaint,0,4.5,-8); // back
plane(16,9,M.wallPaint,-11,4.5,0,0,Math.PI/2); // left
plane(16,9,M.wallPaint,11,4.5,0,0,-Math.PI/2); // right
plane(22,9,M.ceiling,0,9,0,Math.PI/2); // ceiling

box(16,.12,.08,M.baseboard,10.94,.06,0,Math.PI/2);

plane(7.4,5.4,M.rug,0,.006,1.5,-Math.PI/2);

// ═══════════════════════════════════════════════════════
// DESK ZONE — left side
// ═══════════════════════════════════════════════════════
// Desk — L-shaped, solid wood look
// Main surface
const deskTop1=box(3.4,.1,1.5,M.deskWood,-4,1.05,2.4);
// Desk edge banding (lighter strip)
box(3.4,.04,.04,M.deskWoodLight,-4,1.04,1.67);
// Return section
box(1.6,.1,1.8,M.deskWood,-5.4,1.05,-6.8);
box(1.6,.04,.04,M.deskWoodLight,-5.4,1.04,-7.68);

// Desk legs (tapered boxes)
function deskLeg(x,z){
  box(.08,1.05,.08,M.metalDark,x,.525,z);
  box(.12,.04,.12,M.metalDark,x,.02,z); // foot pad
}
deskLeg(-5.6,1.68);deskLeg(-2.4,1.68);deskLeg(-5.6,3.1);deskLeg(-2.4,3.1);

// Cable management box under desk

// ═══════════════════════════════════════════════════════
// CLICKABLES REGISTRY
// ═══════════════════════════════════════════════════════
const clickables=[];

// ═══════════════════════════════════════════════════════
// CAMERA CONTROLS
// ═══════════════════════════════════════════════════════
let camTarget={x:0,y:3.2,z:11};
let lookTarget={x:0,y:1.5,z:0};
let lookCurrent={x:0,y:1.5,z:0};
let theta=0,phi=0,thetaDrag=0,phiDrag=0;
let isDragging=false,dragStart={x:0,y:0},hasMoved=false;
let activeZone=-1;

const lerp=(a,b,t)=>a+(b-a)*t;
const lerpV=(a,b,t)=>({x:lerp(a.x,b.x,t),y:lerp(a.y,b.y,t),z:lerp(a.z,b.z,t)});

// ═══════════════════════════════════════════════════════
// RAYCASTER
// ═══════════════════════════════════════════════════════
const ray=new THREE.Raycaster();
const mouse=new THREE.Vector2();
let hovered=null;

function updateCursor(x,y){
  document.getElementById('cur').style.cssText=`left:${x}px;top:${y}px`;
  document.getElementById('cur-ring').style.cssText=`left:${x}px;top:${y}px`;
}
function checkHover(x,y){
  mouse.set((x/innerWidth)*2-1,-(y/innerHeight)*2+1);
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(clickables);
  hovered=hits.length>0?hits[0].object:null;
  document.body.classList.toggle('hover',!!hovered);
}

document.addEventListener('mousemove',e=>{
  updateCursor(e.clientX,e.clientY);
  checkHover(e.clientX,e.clientY);
  if(isDragging){
    const dx=e.clientX-dragStart.x,dy=e.clientY-dragStart.y;
    if(Math.abs(dx)+Math.abs(dy)>3)hasMoved=true;
    theta=thetaDrag-dx*.005;
    phi=Math.max(-.35,Math.min(.5,phiDrag+dy*.004));
  }
});
document.addEventListener('mousedown',e=>{
  isDragging=true;hasMoved=false;
  dragStart={x:e.clientX,y:e.clientY};
  thetaDrag=theta;phiDrag=phi;
});
document.addEventListener('mouseup',e=>{
  isDragging=false;
  if(!hasMoved&&hovered?.userData?.objectData){
    openModal(hovered.userData.objectData);
  }
});
document.addEventListener('touchstart',e=>{
  const t=e.touches[0];isDragging=true;hasMoved=false;
  dragStart={x:t.clientX,y:t.clientY};thetaDrag=theta;phiDrag=phi;
},{passive:true});
document.addEventListener('touchmove',e=>{
  const t=e.touches[0];
  const dx=t.clientX-dragStart.x,dy=t.clientY-dragStart.y;
  if(Math.abs(dx)+Math.abs(dy)>5)hasMoved=true;
  theta=thetaDrag-dx*.005;
  phi=Math.max(-.35,Math.min(.5,phiDrag+dy*.004));
},{passive:true});
document.addEventListener('touchend',()=>{isDragging=false;});

// ═══════════════════════════════════════════════════════
// ZONE NAVIGATION
// ═══════════════════════════════════════════════════════
const navEl=document.getElementById('nav');
ZONES.forEach((z,i)=>{
  const d=document.createElement('div');d.className='nd';
  d.innerHTML=`<span class="nd-label">${z.tag}</span><div class="nd-pip"></div>`;
  d.onclick=()=>goZone(i);navEl.appendChild(d);
});

function goZone(i){
  activeZone=i;
  const z=ZONES[i];
  camTarget={...z.cam};
  lookTarget={x:z.cam.x*.25,y:1.5,z:z.cam.z*.1};
  theta=0;phi=0;

  document.querySelectorAll('.nd').forEach((d,j)=>d.classList.toggle('active',j===i));

  ['zone-tag','zone-name','zone-desc'].forEach(id=>document.getElementById(id).style.opacity='0');
  setTimeout(()=>{
    document.getElementById('zone-tag').textContent=z.tag;
    document.getElementById('zone-name').textContent=z.name;
    document.getElementById('zone-desc').textContent=z.desc;
    ['zone-tag','zone-name','zone-desc'].forEach(id=>document.getElementById(id).style.opacity='1');
  },200);

  zoneLights.forEach((l,j)=>{ l.intensity = j===i ? 1.6 : 0; });
  document.getElementById('pbar').style.width=((i+1)/ZONES.length*100)+'%';
}

// ═══════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════
function openModal(d){
  document.getElementById('modal-eyebrow').textContent=d.ey;
  document.getElementById('modal-title').textContent=d.title;
  document.getElementById('modal-body').innerHTML=d.body;
  document.getElementById('modal-chips').innerHTML=d.chips.map(c=>`<span class="chip">${c}</span>`).join('');
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal-x').onclick=closeModal;
document.getElementById('modal-bg').onclick=closeModal;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// ═══════════════════════════════════════════════════════
// ANIMATE LOOP
// ═══════════════════════════════════════════════════════
const clock=new THREE.Clock();
const camPos=new THREE.Vector3();
const lookV=new THREE.Vector3();
const orbitR=1.3;

function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();

  // Floating animations
  vball.position.y=.3+Math.sin(t*1.1)*.07;
  lampLight.intensity=1.3+Math.sin(t*1.9)*.12;
  bulbGlow.material.opacity=.85+Math.sin(t*.8)*.08;
  lapGlow.material.opacity=.8+Math.sin(t*.4)*.1;
  monGlow.intensity=.5+Math.sin(t*.3)*.15;

  // Racket gentle sway
  racketGroup.rotation.z=.4+Math.sin(t*.5)*.03;

  // Camera orbit
  const ox=Math.sin(theta)*orbitR;
  const oz=Math.cos(theta)*orbitR;
  const oy=Math.sin(phi)*orbitR;

  camPos.set(
    lerp(camera.position.x,camTarget.x+ox,.055),
    lerp(camera.position.y,camTarget.y+oy,.055),
    lerp(camera.position.z,camTarget.z+oz,.055)
  );
  camera.position.copy(camPos);

  lookCurrent=lerpV(lookCurrent,lookTarget,.065);
  lookV.set(lookCurrent.x+ox*.2,lookCurrent.y,lookCurrent.z);
  camera.lookAt(lookV);

  // Hovered object pulse
  if(hovered){
    const s=1+Math.sin(t*5)*.02;
    hovered.scale.setScalar(s);
  }

  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
